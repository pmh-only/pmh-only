name: Build README

on:
  schedule:
  - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest 
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
      - run: npx pnpm i
      - run: npx pnpm build
      - run: npx pnpm start
        env:
          PF_GITHUB_TOKEN: ${{ secrets.PF_GITHUB_TOKEN }}
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git remote set-url origin --push https://github-actions[bot]:${GITHUB_TOKEN}@github.com/pmh-only/pmh-only.git
          if [ "$(git log -1 --format='%an')" = "github-actions[bot]" ]; then
            git commit --amend -m "build: \`$(date)\` commit"
            git push --force-with-lease origin master
          else
            git commit -m "build: \`$(date)\` commit"
            git push origin master
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
